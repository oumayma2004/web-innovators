<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tfarhida - Accueil</title>
  <link rel="stylesheet" href="styleu.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Barre supérieure -->
  <div class="top-bar">
    <div class="phones">
      <img src="assets/tel1.png" class="icon-phone" alt="Téléphone" />
      <span>+216 50 548 028</span>
      <img src="assets/tel1.png" class="icon-phone" alt="Téléphone" />
      <span>+216 99 727 727</span>
    </div>
    <div class="user-links">
      <a href="#" onclick="showLogin()">🔒 Log in</a>
      <a href="#" onclick="showSignup()">👤 Sign up</a>
    </div>
  </div>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="logo">
      <img src="assets/logosite1.png">
    </div>
  </nav>

  <!-- Formulaire Login -->
  <div class="form-popup" id="login">
    <form id="loginForm">
        <h3>Connexion</h3>
        <input type="email"  placeholder="Email" id="loginEmail" >
        <input type="password"  placeholder="Mot de passe"  id="loginPassword" >
        <button type="submit" >Se connecter</button>
        <button class="close-btn" onclick="closeForms()">Fermer</button>
      </form>
  </div>

  <!-- Formulaire Signup -->
  <div class="form-popup"  id="signup">
    <form  id="signupForm" action="signup.php" method="POST">
      <h3>Inscription</h3>
      <input type="text" id="prenom" name="prenom" placeholder="Prénom"  />
      <input type="text"id="nom" name="nom" placeholder="Nom"  />
      <input type="text" id="email" name="email" placeholder="Email"  />
      <input type="tel" id="phone" name="phone" placeholder="Numéro de téléphone"  />
      <input type="text" id="adresse"  name="adresse" placeholder="Adresse"  />
      <input type="date" id="date_c" name="date_c" placeholder="Date de naissance"  />
      <input type="password" id="signupPassword" name="password" placeholder="Mot de passe"  />
      <input type="password" id="signupPasswordConfirm" name="passwordConfirm" placeholder="Confirmer le mot de passe"  />
      <button type="submit">S'inscrire</button>
      <button type="button" class="close-btn" onclick="closeForms()">Fermer</button>
    </form>
  </div>

  <!-- Script pour gérer les formulaires -->
  <script>
    function showLogin() {
      document.getElementById('login').style.display = 'block';
      document.getElementById('signup').style.display = 'none';
    }

    function showSignup() {
      document.getElementById('signup').style.display = 'block';
      document.getElementById('login').style.display = 'none';
    }

    function closeForms() {
      document.getElementById('login').style.display = 'none';
      document.getElementById('signup').style.display = 'none';
    }
  </script>
  <script>
    document.getElementById("signupForm").addEventListener("submit", function (event) {
        event.preventDefault();

        const prenom = document.getElementById("prenom").value;
        const nom = document.getElementById("nom").value;
        const email = document.getElementById("email").value;
        const phone = document.getElementById("phone").value;
        const adresse = document.getElementById("adresse").value;
        const date_c = document.getElementById("date_c").value;
        const password = document.getElementById("signupPassword").value;
        const passwordConfirm = document.getElementById("signupPasswordConfirm").value;

        // Regex patterns
        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        const phonePattern = /^[0-9]{8,15}$/; // exemple : entre 8 et 15 chiffres
        const passwordPattern = /^(?=.*[A-Z])(?=.*[a-z])(?=.*\d)(?=.*[\W_]).{8,}$/;

        if (!prenom) {
            alert("Le prénom est requis.");
            return;
        }

        if (!nom) {
            alert("Le nom est requis.");
            return;
        }
        if (prenom.length <= 2) {
            alert("Le prénom dois sup a 2 char.");
            return;
        }

        if (nom.length <= 3) {
            alert("Le prénom dois sup a 2 char.");
            return;
        }

        if (!email) {
            alert("L'email est requis.");
            return;
        } else if (!emailPattern.test(email)) {
            alert("L'email n'est pas valide.");
            return;
        }

        if (!phone) {
            alert("Le numéro de téléphone est requis.");
            return;
        } else if (!phonePattern.test(phone)) {
            alert("Le numéro de téléphone n'est pas valide.");
            return;
        }

        if (!adresse) {
            alert("L'adresse est requise.");
            return;
        }

        if (!date_c) {
            alert("La date de naissance est requise.");
            return;
        }

        if (!password) {
            alert("Le mot de passe est requis.");
            return;
        } else if (!passwordPattern.test(password)) {
            alert("Le mot de passe doit contenir au moins 8 caractères, une majuscule, une minuscule, un chiffre et un caractère spécial.");
            return;
        }

        if (password !== passwordConfirm) {
            alert("Les mots de passe ne correspondent pas.");
            return;
        }

        // Si tout est bon
        alert("Formulaire envoyé avec succès !");
        this.submit();
    });
</script>

<script>
  document.getElementById("loginForm").addEventListener("submit", function (event) {
      event.preventDefault();
      var email = document.getElementById("loginEmail").value;
      var password = document.getElementById("loginPassword").value;
      var formData = new FormData();
      formData.append("email", email);
      formData.append("password", password);
      var xhr = new XMLHttpRequest();
      xhr.open("POST", "login.php", true);
      xhr.onreadystatechange = function () {
          if (xhr.readyState === 4 && xhr.status === 200) {
              var response = xhr.responseText;
              if (response === "success") {
                  window.location.href = "update.php";
              } else {
                  alert("Email ou mot de passe incorrect.");
              }
          }
      };
      xhr.send(formData);
  });
</script>

</body>
</html>
